<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Ankieta upadłościowa</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  padding: 20px;
  background: #f7f7f7;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.question {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

label {
  font-weight: bold;
  display: block;
  margin-bottom: 8px;
  line-height: 1.4;
}

input, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

textarea {
  min-height: 80px;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 16px;
  background: #111;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #333;
}

#status {
  text-align: center;
  margin-top: 15px;
  font-weight: bold;
}
</style>

</head>

<body>

<h1>Ankieta upadłościowa</h1>

<form id="ankietaForm">

<div class="question">
<label>1. Imię i nazwisko</label>
<input name="full_name" required>
</div>

<div class="question">
<label>2. PESEL</label>
<input name="pesel">
</div>

<div class="question">
<label>3. NIP (jeśli posiadałeś w ciągu ostatnich 10 lat)</label>
<input name="nip">
</div>

<div class="question">
<label>4. Numer telefonu</label>
<input name="phone">
</div>

<div class="question">
<label>5. Adres e-mail</label>
<input name="email">
</div>

<div class="question">
<label>6. Miejsce zamieszkania i adres do doręczeń (jeśli inny)</label>
<textarea name="address"></textarea>
</div>

<div class="question">
<label>7. Składniki majątku (nieruchomości, ruchomości, sprzęty o większej wartości)</label>
<textarea name="assets"></textarea>
</div>

<div class="question">
<label>8. Posiadana gotówka</label>
<input name="cash">
</div>

<div class="question">
<label>9. Środki na rachunkach bankowych (kwota i bank)</label>
<textarea name="bank_accounts"></textarea>
</div>

<div class="question">
<label>10. Czy ktoś jest Twoim dłużnikiem?</label>
<textarea name="debtors"></textarea>
</div>

<div class="question">
<label>11. Wierzyciele z kwotami i datami wymagalności</label>
<textarea name="creditors_list"></textarea>
</div>

<div class="question">
<label>12. Czy są sporne długi?</label>
<textarea name="disputed_debts"></textarea>
</div>

<div class="question">
<label>13. Dochody z ostatnich 6 miesięcy (łączna kwota)</label>
<input name="income_6m">
</div>

<div class="question">
<label>14. Koszty utrzymania w ostatnich 6 miesiącach</label>
<input name="expenses_6m">
</div>

<div class="question">
<label>15. Czynności prawne – nieruchomości / udziały (12 miesięcy)</label>
<textarea name="legal_actions_property"></textarea>
</div>

<div class="question">
<label>16. Czynności prawne – majątek powyżej 10 000 zł (12 miesięcy)</label>
<textarea name="legal_actions_assets"></textarea>
</div>

<div class="question">
<label>17. Sytuacja rodzinna i zawodowa</label>
<textarea name="family_situation"></textarea>
</div>

<div class="question">
<label>18. Jak doszło do niewypłacalności?</label>
<textarea name="insolvency_story"></textarea>
</div>

<button type="submit">Wyślij ankietę</button>

</form>

<p id="status"></p>

<script>
const form = document.getElementById("ankietaForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(form).entries());

  const res = await fetch("https://pogotowieupadlosciowe-api.workers.dev", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  document.getElementById("status").innerText = await res.text();
});
</script>

</body>
</html>
