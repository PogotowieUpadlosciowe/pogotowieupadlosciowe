<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>CRM - Ankiety</title>

<style>
body {
  font-family: Arial;
  max-width: 1000px;
  margin: auto;
  padding: 20px;
  background: #f5f5f5;
}

h1 {
  text-align: center;
}

.container {
  display: flex;
  gap: 20px;
}

.list {
  width: 40%;
  background: white;
  padding: 10px;
  border-radius: 10px;
  height: 80vh;
  overflow-y: auto;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.item:hover {
  background: #f0f0f0;
}

.details {
  width: 60%;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

button {
  margin-bottom: 10px;
  padding: 10px;
  width: 100%;
}
</style>
</head>

<body>

<h1>CRM - Ankiety</h1>

<button onclick="loadData()">🔄 Odśwież</button>

<div class="container">
  <div class="list" id="list"></div>
  <div class="details" id="details">
    <h3>Kliknij klienta</h3>
  </div>
</div>

<script>

let data = [];

async function loadData() {
  const res = await fetch("https://pogotowieupadlosciowe-api.pogotowieupadlosciowe.workers.dev/submissions");
  data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <b>${item.full_name || "Brak imienia"}</b><br>
      📞 ${item.phone || ""}<br>
      📅 ${item.created_at}
    `;
    div.onclick = () => showDetails(index);
    list.appendChild(div);
  });
}

function showDetails(index) {
  const item = data[index];

  document.getElementById("details").innerHTML = `
    <h2>${item.full_name || ""}</h2>

    <p><b>PESEL:</b> ${item.pesel || ""}</p>
    <p><b>Telefon:</b> ${item.phone || ""}</p>
    <p><b>Email:</b> ${item.email || ""}</p>
    <p><b>Adres:</b> ${item.address || ""}</p>

    <hr>

    <p><b>Majątek:</b><br>${item.assets || ""}</p>
    <p><b>Dochody:</b> ${item.income_6m || ""}</p>
    <p><b>Wydatki:</b> ${item.expenses_6m || ""}</p>

    <hr>

    <p><b>Opis niewypłacalności:</b><br>${item.insolvency_story || ""}</p>
  `;
}

loadData();

</script>

</body>
</html>
